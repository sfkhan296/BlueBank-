<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/customers.css}">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <i class="bi bi-bank2"></i>

            <span>BlueBank</span>

        </div>

        <ul class="menu">

            <li>

                <a href="/dashboard">

                    <i class="bi bi-grid-fill"></i>

                    Dashboard

                </a>

            </li>

            <li class="active">

                <a href="/customers">

                    <i class="bi bi-people-fill"></i>

                    Customers

                </a>

            </li>

            <li>

                <a href="/addCustomer">

                    <i class="bi bi-person-plus-fill"></i>

                    Add Customer

                </a>

            </li>

                        <li>
                <a href="/login">
                    <i class="bi bi-box-arrow-right"></i>
                    Logout
                </a>
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <!-- Header -->

        <div class="topbar">

    <div>
        <h2>Customers</h2>
        <p>Manage all registered banking customers.</p>
    </div>

    <div class="top-actions">

        <a href="/addCustomer" class="btn btn-primary">

            <i class="bi bi-person-plus-fill"></i>

            Add Customer

        </a>

    </div>

</div>


        <!-- Statistics -->

        <div class="stats-grid">

            <div class="stat-card">

                <i class="bi bi-people-fill"></i>

                <h5>Total Customers</h5>

                <h2 th:text="${totalCustomers}">0</h2>

            </div>

            <div class="stat-card">

                <i class="bi bi-wallet2"></i>

                <h5>Total Balance</h5>

                <h2>

                    ₹<span th:text="${#numbers.formatDecimal(totalBalance,0,'COMMA',2,'POINT')}"></span>

                </h2>

            </div>

            <div class="stat-card">

                <i class="bi bi-piggy-bank-fill"></i>

                <h5>Savings</h5>

                <h2 th:text="${savings}">0</h2>

            </div>

            <div class="stat-card">

                <i class="bi bi-credit-card-fill"></i>

                <h5>Current</h5>

                <h2 th:text="${current}">0</h2>

            </div>

            <div class="stat-card">

                <i class="bi bi-safe2-fill"></i>

                <h5>Fixed Deposit</h5>

                <h2 th:text="${fixedDeposit}">0</h2>

            </div>

        </div>

        <!-- Toolbar -->

        <div class="toolbar">

            <div class="search-box">

                <i class="bi bi-search"></i>

                <input
                        type="text"
                        id="searchInput"
                        placeholder="Search customer...">

            </div>

            <button class="btn btn-success">

                <i class="bi bi-file-earmark-arrow-down-fill"></i>

                Export CSV

            </button>

        </div>

        <!-- Customer Table -->

        <div class="table-card">

            <table class="table align-middle" id="customerTable">

                <thead>

                <tr>

                    <th>Customer</th>

                    <th>Account</th>

                    <th>Type</th>

                    <th>Balance</th>

                    <th>Phone</th>

                    <th>Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="customer : ${customers}">

                    <td>

                        <div class="customer-info">

                            <div class="avatar"

                                 th:text="${#strings.substring(customer.fullName,0,1)}">

                                A

                            </div>

                            <div>

                                <strong th:text="${customer.fullName}"></strong>

                                <br>

                                <small th:text="${customer.email}"></small>

                            </div>

                        </div>

                    </td>

                    <td th:text="${customer.accountNumber}"></td>

                    <td>

<span
th:classappend="${customer.accountType=='Savings'} ? 'badge bg-success' :
(${customer.accountType=='Current'} ? 'badge bg-warning text-dark' :
'badge bg-primary')"

th:text="${customer.accountType}">

</span>

                    </td>

                    <td>

                        ₹ <span th:text="${customer.balance}"></span>

                    </td>

                    <td th:text="${customer.phone}"></td>

                    <td>

<a
th:href="@{/editCustomer/{id}(id=${customer.id})}"
class="btn btn-sm btn-primary">

<i class="bi bi-pencil-fill"></i>

</a>

<a
th:href="@{/deleteCustomer/{id}(id=${customer.id})}"
class="btn btn-sm btn-danger"
onclick="return confirm('Delete this customer?')">

<i class="bi bi-trash-fill"></i>

</a>

<button class="btn btn-sm btn-success">

<i class="bi bi-eye-fill"></i>

</button>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

        <!-- Pagination -->

        <nav class="mt-4">

            <ul class="pagination justify-content-center">

                <li class="page-item">

                    <a class="page-link" href="#">

                        Previous

                    </a>

                </li>

                <li class="page-item active">

                    <a class="page-link" href="#">

                        1

                    </a>

                </li>

                <li class="page-item">

                    <a class="page-link" href="#">

                        Next

                    </a>

                </li>

            </ul>

        </nav>

    </main>

</div>

<script>

const search=document.getElementById("searchInput");

search.addEventListener("keyup",function(){

let filter=this.value.toUpperCase();

let rows=document.querySelectorAll("#customerTable tbody tr");

rows.forEach(row=>{

let text=row.innerText.toUpperCase();

row.style.display=text.includes(filter)?"":"none";

});

});

</script>

</body>

</html>
