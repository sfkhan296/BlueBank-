<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Customer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/addCustomer.css}">

</head>

<body>

<div class="background-shapes">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container py-5">

    <div class="form-card">

        <!-- Header -->

        <div class="text-center mb-5">

            <div class="icon-circle">

                <i class="bi bi-person-plus-fill"></i>

            </div>

            <h2 class="mt-3">Register New Customer</h2>

            <p class="text-muted">
                Enter customer information to create a new bank account.
            </p>

        </div>

        <form th:action="@{/saveCustomer}" method="post" th:object="${customer}">

            <!-- Personal Information -->

            <div class="section-title">

                <i class="bi bi-person-fill"></i>

                Personal Information

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label>Full Name</label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{fullName}"
                                placeholder="Enter Full Name"
                                required>

                    </div>

                </div>

                <div class="col-md-6 mb-4">

                    <label>Email Address</label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="bi bi-envelope-fill"></i>
                        </span>

                        <input
                                type="email"
                                class="form-control"
                                th:field="*{email}"
                                placeholder="example@email.com"
                                required>

                    </div>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label>Phone Number</label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="bi bi-telephone-fill"></i>
                        </span>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{phone}"
                                placeholder="9876543210"
                                required>

                    </div>

                </div>

                <div class="col-md-6 mb-4">

                    <label>Account Number</label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-credit-card-fill"></i>

                        </span>

                        <input
                                type="text"
                                id="accountNumber"
                                class="form-control"
                                th:field="*{accountNumber}"
                                >

                    </div>

                </div>

            </div>

            <!-- Banking Information -->

            <div class="section-title">

                <i class="bi bi-bank2"></i>

                Banking Information

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label>Account Type</label>

                    <select class="form-select" th:field="*{accountType}" required>

    <option value="">Select Account Type</option>

    <option value="Savings">Savings Account</option>

    <option value="Current">Current Account</option>

    <option value="Fixed Deposit">Fixed Deposit</option>

</select>

                </div>

                <div class="col-md-6 mb-4">

                    <label>Opening Balance</label>

                    <div class="input-group">

                        <span class="input-group-text">

                            ₹

                        </span>

                        <input
                                type="number"
                                class="form-control"
                                th:field="*{balance}"
                                placeholder="5000"
                                required>

                    </div>

                </div>

            </div>

            <!-- Address -->

            <div class="section-title">

                <i class="bi bi-geo-alt-fill"></i>

                Address

            </div>

            <div class="mb-4">

                <textarea
class="form-control"
rows="4"
th:field="*{address}"
placeholder="Enter Complete Address"
required></textarea>

            </div>

            <!-- Buttons -->

            <div class="button-group">

                <a href="/dashboard" class="btn btn-outline-secondary">

                    <i class="bi bi-arrow-left"></i>

                    Dashboard

                </a>

                <button
                        type="reset"
                        class="btn btn-warning">

                    <i class="bi bi-arrow-clockwise"></i>

                    Reset

                </button>

                <button
                        type="submit"
                        class="btn btn-primary">

                    <i class="bi bi-check-circle-fill"></i>

                    Save Customer

                </button>

            </div>

        </form>

    </div>

</div>

<script>

function generateAccountNumber(){

    const random = Math.floor(100000 + Math.random()*900000);

    const account = document.getElementById("accountNumber");

    account.value = "ACC2026" + random;

    account.dispatchEvent(new Event("input"));

}

generateAccountNumber();

</script>

</body>
</html>
